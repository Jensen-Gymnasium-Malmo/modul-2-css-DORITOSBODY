<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Selectors Uppgift</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Vanlig h1 -->
    <h1>Min Webbsida</h1>

    <!-- h1 med klass -->
    <h1 class="special-heading">Hej detta är special headingen</h1>

    <!-- div med bakgrund -->
    <div class="box">
        <p>Detta är en paragraf inuti en div med bakgrund.</p>
    </div>

    <!-- div med textklass -->
    <div class="text-style">
        Detta är en div med stylad text.
    </div>

    <!-- extra paragraf -->
    <p>Detta är en extra paragraf för att visa styling av p-element.</p>

</body>
</html>
